kind = "mobile"
previewPath = "/"
title = "VoiceReply"
version = "1.0.0"
id = "artifacts/voice-reply"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21541
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/voice-reply run dev"

[services.env]
PORT = "21541"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/voice-reply", "run", "build"]
run = ["pnpm", "--filter", "@workspace/voice-reply", "run", "serve"]
