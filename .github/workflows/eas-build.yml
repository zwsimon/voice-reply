name: Build iOS Keyboard Extension

on:
  push:
    branches: [main]
    paths:
      - "artifacts/voice-reply/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build iOS (.ipa)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set up iOS credentials (create extension provisioning profile)
        working-directory: artifacts/voice-reply
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          APPLE_EXT_PROFILE_BASE64: ${{ secrets.APPLE_EXT_PROFILE_BASE64 }}
          APPLE_MAIN_PROFILE_BASE64: ${{ secrets.APPLE_MAIN_PROFILE_BASE64 }}
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: node scripts/setup-credentials.mjs

      - name: Push extension profile to EAS secrets (makes it available on Mac build machine)
        working-directory: artifacts/voice-reply
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_EXT_PROFILE_BASE64: ${{ secrets.APPLE_EXT_PROFILE_BASE64 }}
        run: |
          if [ -n "$APPLE_EXT_PROFILE_BASE64" ]; then
            echo "Pushing APPLE_EXT_PROFILE_BASE64 to EAS secrets..."
            eas secret:create \
              --scope project \
              --name APPLE_EXT_PROFILE_BASE64 \
              --type string \
              --value "$APPLE_EXT_PROFILE_BASE64" \
              --force \
              --non-interactive 2>/dev/null || \
            echo "⚠️  Secret may already exist — continuing"
          fi

      - name: Build iOS with EAS
        working-directory: artifacts/voice-reply
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          VOICEREPLY_API_BASE: ${{ secrets.VOICEREPLY_API_BASE }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait

      - name: Post build URL to summary
        run: |
          echo "## Build submitted to EAS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check build status and download the .ipa at:" >> $GITHUB_STEP_SUMMARY
          echo "**https://expo.dev/accounts/vbcoder/projects/voice-reply/builds**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once the .ipa is ready, install it on your iPhone via the link EAS emails you." >> $GITHUB_STEP_SUMMARY
