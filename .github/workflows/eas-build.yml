name: Build iOS Keyboard Extension

on:
  push:
    branches: [main]
    paths:
      - "artifacts/voice-reply/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build iOS (.ipa)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Probe @expo/apple-utils API
        run: |
          EAS_MODULES="/opt/hostedtoolcache/eas-cli/18.3.0/x64/node_modules"
          APPLE_UTILS="$EAS_MODULES/@expo/apple-utils"
          echo "=== package.json ==="
          cat "$APPLE_UTILS/package.json" 2>/dev/null | head -15 || echo "NOT FOUND at $APPLE_UTILS"
          echo "=== build dir ==="
          ls "$APPLE_UTILS/build/" 2>/dev/null | head -30 || echo "no build dir"
          echo "=== src dir ==="
          ls "$APPLE_UTILS/src/" 2>/dev/null | head -30 || echo "no src dir"
          echo "=== test require ==="
          node --experimental-vm-modules -e "
            const Module = require('module');
            const req = Module.createRequire('$APPLE_UTILS/build/index.js');
            const pkg = req('./index.js');
            console.log('Exports:', Object.keys(pkg).join(', '));
          " 2>&1 || echo "(require failed)"
          echo "=== index.js first 80 lines ==="
          head -80 "$APPLE_UTILS/build/index.js" 2>/dev/null || echo "no index.js"

      - name: Set up iOS credentials (create extension provisioning profile)
        working-directory: artifacts/voice-reply
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: node scripts/setup-credentials.mjs

      - name: Build iOS with EAS
        working-directory: artifacts/voice-reply
        env:
          VOICEREPLY_API_BASE: ${{ secrets.VOICEREPLY_API_BASE }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive

      - name: Post build URL to summary
        run: |
          echo "## Build submitted to EAS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check build status and download the .ipa at:" >> $GITHUB_STEP_SUMMARY
          echo "**https://expo.dev/accounts/vbcoder/projects/voice-reply/builds**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once the .ipa is ready, install it on your iPhone via the link EAS emails you." >> $GITHUB_STEP_SUMMARY
