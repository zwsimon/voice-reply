name: Build iOS Keyboard Extension

on:
  push:
    branches: [main]
    paths:
      - "artifacts/voice-reply/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build iOS (.ipa)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Probe @expo/apple-utils location and API
        run: |
          echo "=== which eas ==="
          which eas
          echo "=== eas version ==="
          eas --version
          echo "=== locate apple-utils ==="
          EAS_BIN=$(which eas)
          EAS_ROOT=$(node -e "
            const p = require('path');
            // The eas binary is typically at /opt/hostedtoolcache/eas-cli/<ver>/x64/bin/eas
            // or ~/.npm/bin/eas -> actual location varies
            // Try to find @expo/apple-utils via require.resolve
            try {
              const loc = require.resolve('@expo/apple-utils/package.json');
              console.log('FOUND VIA require:', loc);
            } catch(e) {
              console.log('NOT IN GLOBAL MODULES');
            }
          ")
          echo "require.resolve result: $EAS_ROOT"
          echo "=== search for apple-utils in npm global dirs ==="
          for dir in \$(npm root -g) ~/.nvm/versions/node/*/lib/node_modules /opt/hostedtoolcache/eas-cli/*/x64/node_modules; do
            if [ -d \"\$dir/@expo/apple-utils\" ]; then
              echo \"FOUND: \$dir/@expo/apple-utils\"
              cat \"\$dir/@expo/apple-utils/package.json\" | head -5
              echo \"=== exports ===\"
              ls \"\$dir/@expo/apple-utils/build/\" 2>/dev/null | head -20
            fi
          done

      - name: Set up iOS credentials (create extension provisioning profile)
        working-directory: artifacts/voice-reply
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: node scripts/setup-credentials.mjs

      - name: Build iOS with EAS
        working-directory: artifacts/voice-reply
        env:
          VOICEREPLY_API_BASE: ${{ secrets.VOICEREPLY_API_BASE }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive

      - name: Post build URL to summary
        run: |
          echo "## Build submitted to EAS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check build status and download the .ipa at:" >> $GITHUB_STEP_SUMMARY
          echo "**https://expo.dev/accounts/vbcoder/projects/voice-reply/builds**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once the .ipa is ready, install it on your iPhone via the link EAS emails you." >> $GITHUB_STEP_SUMMARY
