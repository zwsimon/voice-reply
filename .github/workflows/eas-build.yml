name: Build iOS Keyboard Extension

on:
  push:
    branches: [main]
    paths:
      - "artifacts/voice-reply/**"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build iOS (.ipa)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS with EAS
        working-directory: artifacts/voice-reply
        env:
          VOICEREPLY_API_BASE: ${{ secrets.VOICEREPLY_API_BASE }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output /tmp/voicereply.ipa || true

      - name: Post build URL to summary
        run: |
          echo "## ✅ Build submitted to EAS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check build status and download the .ipa at:" >> $GITHUB_STEP_SUMMARY
          echo "**https://expo.dev/accounts/YOUR_EXPO_USERNAME/projects/voice-reply/builds**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once the .ipa is ready, install it on your iPhone via the link EAS emails you." >> $GITHUB_STEP_SUMMARY
